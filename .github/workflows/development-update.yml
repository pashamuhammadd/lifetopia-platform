name: Lifetopia Development Update

on:
  release:
    types:
      - published

jobs:
  notify-development-update:
    runs-on: ubuntu-latest

    steps:
      - name: Send development update to Discord
        env:
          WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_DEV }}
          ROLE_ID: ${{ secrets.DISCORD_ROLE_ID }}
          RELEASE_NAME: ${{ github.event.release.name }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          RELEASE_BODY: ${{ github.event.release.body }}
          RELEASE_URL: ${{ github.event.release.html_url }}
          AUTHOR: ${{ github.event.release.author.login }}
        run: |
          NOTES="${RELEASE_BODY:-No release notes provided.}"
          NOTES="${NOTES:0:900}"

          PAYLOAD=$(jq -n \
            --arg role_id "$ROLE_ID" \
            --arg release_name "$RELEASE_NAME" \
            --arg release_tag "$RELEASE_TAG" \
            --arg notes "$NOTES" \
            --arg release_url "$RELEASE_URL" \
            --arg author "$AUTHOR" \
            '{
              username: "Lifetopia Development",
              content: ("<@&" + $role_id + ">"),
              allowed_mentions: {
                roles: [$role_id]
              },
              embeds: [
                {
                  title: "🚀 Lifetopia World Development Milestone",
                  description: "A new official development update has been released.",
                  color: 5763719,
                  thumbnail: {
                    url: "https://lifetopiaworld.io/images/logo/logo-lifetopia-world.png"
                  },
                  fields: [
                    {
                      name: "Release",
                      value: ("**" + $release_name + "**"),
                      inline: false
                    },
                    {
                      name: "Version",
                      value: ("`" + $release_tag + "`"),
                      inline: true
                    },
                    {
                      name: "Published By",
                      value: $author,
                      inline: true
                    },
                    {
                      name: "Release Notes",
                      value: $notes,
                      inline: false
                    },
                    {
                      name: "Links",
                      value: ("[View Release](" + $release_url + ") • [Open Website](https://lifetopiaworld.io)"),
                      inline: false
                    }
                  ],
                  footer: {
                    text: "🏡 Every release brings Lifetopia closer to Beta."
                  }
                }
              ]
            }'
          )

          RESPONSE=$(curl -s -w "%{http_code}" -o response.txt \
            -H "Content-Type: application/json" \
            -X POST \
            -d "$PAYLOAD" \
            "$WEBHOOK")

          cat response.txt

          if [ "$RESPONSE" -lt 200 ] || [ "$RESPONSE" -ge 300 ]; then
            echo "Discord webhook failed with status $RESPONSE"
            exit 1
          fi